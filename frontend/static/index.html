<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云计算课程设计 · Flask + Redis Web 应用</title>
  <style>
    body { font-family: system-ui, "Microsoft YaHei", Arial; margin: 40px; line-height: 1.7; color:#222; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 24px; max-width: 600px; box-shadow:0 2px 8px rgba(0,0,0,.05);}
    button { padding: 8px 16px; margin-right: 8px; cursor: pointer; border-radius:6px; border:1px solid #888; background:#fafafa;}
    pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow:auto;}
    .info { color:#0a58ca; font-weight:600;}
  </style>
</head>
<body>
  <div class="card">
    <h1>云计算课程设计 · Flask + Redis 两层应用</h1>
    <p class="info">学号：2023112594　姓名：陶秋源　班级：计算机科学与技术04班</p>
    <p>点击按钮测试「前端 Nginx → 后端 Flask → Redis」三层通信：</p>
    <button onclick="call('/api/ping')">调用 /api/ping</button>
    <button onclick="call('/api/visits')">调用 /api/visits（写 Redis 计数）</button>
    <button onclick="call('/api/info')">调用 /api/info</button>
    <pre id="out">等待请求…</pre>
  </div>
  <script>
    async function call(path) {
      const out = document.getElementById('out');
      out.textContent = '请求中 ' + path + ' ...';
      try {
        const r = await fetch(path);
        out.textContent = path + '  ->  ' + JSON.stringify(await r.json(), null, 2);
      } catch (e) {
        out.textContent = '请求失败: ' + e;
      }
    }
  </script>
</body>
</html>
