# ── 前端 Deployment（任务5：ConfigMap 以 Volume 挂载覆盖 default.conf）
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: default-secret
      containers:
        - name: frontend
          image: swr.cn-north-4.myhuaweicloud.com/group17/frontend:v1
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            # 任务5：ConfigMap 以 volume 形式挂载（非环境变量），覆盖镜像内默认配置
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: nginx-conf
          configMap:
            name: frontend-nginx-conf
            items:
              - key: default.conf
                path: default.conf
