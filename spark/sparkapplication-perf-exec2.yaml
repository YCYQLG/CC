# A-3 性能对比：PySpark executorInstances=1
apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: perf-exec2
  namespace: default
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: swr.cn-north-4.myhuaweicloud.com/group17/pyspark:v9
  imagePullPolicy: IfNotPresent
  imagePullSecrets:
    - default-secret
  mainApplicationFile: local:///opt/spark/work/perf_query.py
  sparkVersion: "3.4.3"
  restartPolicy:
    type: Never
  volumes:
    - name: spark-code
      configMap:
        name: spark-code
  driver:
    cores: 1
    coreLimit: "1200m"
    coreRequest: "100m"
    memory: "1g"
    serviceAccount: spark
    env:
      - name: OBS_BUCKET
        value: "group17"
      - name: EXECUTOR_INSTANCES
        value: "2"
    envFrom:
      - secretRef:
          name: obs-credentials
    volumeMounts:
      - name: spark-code
        mountPath: /opt/spark/work
  executor:
    cores: 1
    coreRequest: "50m"
    instances: 2
    memory: "1g"
    env:
      - name: OBS_BUCKET
        value: "group17"
    envFrom:
      - secretRef:
          name: obs-credentials
    volumeMounts:
      - name: spark-code
        mountPath: /opt/spark/work
