version: "3.9"
services:
  backend:
    build: ./backend
    image: app-backend:latest
    ports:
      - "5000:5000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}   # 本地可为空
      - APP_ENV=development
    depends_on:
      - redis
  frontend:
    build: ./frontend
    image: app-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
